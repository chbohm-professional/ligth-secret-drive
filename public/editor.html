<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editor</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/editor.css">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body class="editor-page">

    <!-- Header -->
    <header class="editor-header">
        <div class="editor-header-left">
            <a href="/explorer.html" class="btn-back" id="btnBack">← Explorador</a>
            <span class="editor-filename" id="editorFilename">Untitled</span>
            <span class="save-status" id="saveStatus"></span>
        </div>
        <div class="editor-header-right">
            <button class="toolbar-btn" id="btnSaveNow">💾 Guardar</button>
        </div>
    </header>

    <!-- Formatting toolbar -->
    <div class="editor-toolbar">
        <button class="fmt-btn" data-cmd="bold"      title="Negrita (Ctrl+B)"><b>B</b></button>
        <button class="fmt-btn" data-cmd="italic"    title="Cursiva (Ctrl+I)"><i>I</i></button>
        <button class="fmt-btn" data-cmd="underline" title="Subrayado (Ctrl+U)"><u>U</u></button>
        <button class="fmt-btn" data-cmd="strikeThrough" title="Tachado"><s>S</s></button>
        <div class="toolbar-sep"></div>

        <select id="headingSelect" title="Text style">
            <option value="p">Párrafo</option>
            <option value="h1">Encabezado 1</option>
            <option value="h2">Encabezado 2</option>
            <option value="h3">Encabezado 3</option>
            <option value="pre">Código</option>
            <option value="blockquote">Cita</option>
        </select>

        <div class="toolbar-sep"></div>
        <button class="fmt-btn" data-cmd="insertUnorderedList" title="Lista">• ≡</button>
        <button class="fmt-btn" data-cmd="insertOrderedList"   title="List numerada">1. ≡</button>
        <div class="toolbar-sep"></div>

        <button class="fmt-btn" data-cmd="justifyLeft"   title="Alinear a la izquierda">⬅</button>
        <button class="fmt-btn" data-cmd="justifyCenter" title="Centrar">⬛</button>
        <button class="fmt-btn" data-cmd="justifyRight"  title="Alinear a la derecha">➡</button>
        <div class="toolbar-sep"></div>

        <button class="fmt-btn" data-cmd="undo" title="Deshacer (Ctrl+Z)">↩</button>
        <button class="fmt-btn" data-cmd="redo" title="Rehacer (Ctrl+Y)">↪</button>
        <div class="toolbar-sep"></div>

        <button class="fmt-btn" id="btnInsertLink"  title="Insertar link">🔗</button>
        <button class="fmt-btn" id="btnInsertHr"    title="Línea horizontal">—</button>
    </div>

    <!-- Document canvas -->
    <div class="editor-canvas">
        <div class="editor-paper"
             id="editorContent"
             contenteditable="true"
             spellcheck="true">
        </div>
    </div>

    <!-- Status bar -->
    <footer class="editor-status">
        <span id="wordCount">0 words</span>
        <span id="charCount">0 chars</span>
        <span id="autoSaveInfo">Auto-save every 5s</span>
    </footer>

    <script src="/js/app-config.js"></script>
    <script src="/js/api.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/editor.js"></script>
</body>
</html>
