<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vault — Explorador</title>
    <link rel="stylesheet" href="/css/style.css">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body class="explorer-page">

    <!-- Header -->
    <header class="header">
        <div class="header-left">
            <span class="header-logo">🔒</span>
            <span class="header-title">Vault cifrado</span>
        </div>
        <div class="header-toolbar">
            <button class="toolbar-btn" id="btnFolders" title="Seleccionar carpeta">
                🗂 Carpetas
            </button>
            <button class="toolbar-btn" id="btnUpload" title="Subir archivos">
                ⬆ Subir
            </button>
            <button class="toolbar-btn" id="btnNewFolder" title="Crear carpeta">
                📁 Nueva carpeta
            </button>
            <button class="toolbar-btn" id="btnNewDoc" title="Crear documento">
                📝 Nuevo documento
            </button>
            <button class="toolbar-btn" id="btnDownload" title="Descargar seleccionados" disabled>
                ⬇ Descargar
            </button>
            <button class="toolbar-btn btn-danger" id="btnDelete" title="Eliminar seleccionados" disabled>
                🗑 Eliminar
            </button>
        </div>
        <div class="header-right">
            <span id="userEmail" class="user-email"></span>
            <button class="toolbar-btn" id="btnLock" title="Bloquear">🔒 Bloquear</button>
            <button class="toolbar-btn" id="btnLogout" title="Salir">Salir</button>
        </div>
    </header>

    <!-- Breadcrumb -->
    <div class="breadcrumb" id="breadcrumb">
        <span class="breadcrumb-item active" data-id="null">Inicio</span>
    </div>

    <!-- Main layout -->
    <div class="explorer-layout">
        <main class="content" id="content">
            <div class="file-list" id="fileList">
                <div class="empty-row">Cargando…</div>
            </div>
        </main>
    </div>

    <!-- Status bar -->
    <footer class="status-bar">
        <span id="statusText">Listo</span>
        <span id="selectionInfo"></span>
    </footer>

    <!-- Context Menu -->
    <div class="context-menu" id="contextMenu" style="display:none">
        <div class="menu-item" data-action="open">📂 Abrir</div>
        <div class="menu-item" data-action="download">⬇ Descargar</div>
        <div class="menu-item" data-action="rename">✏ Cambiar nombre</div>
        <div class="menu-item" data-action="move">✂ Mover a…</div>
        <div class="menu-item" data-action="copy">📋 Copiar a…</div>
        <div class="menu-separator"></div>
        <div class="menu-item menu-danger" data-action="delete">🗑 Eliminar</div>
    </div>

    <!-- Upload input (hidden) -->
    <input type="file" id="fileInput" multiple style="display:none">

    <!-- Dialogs -->
    <div class="modal-overlay" id="modalOverlay" style="display:none">
        <div class="modal" id="modal">
            <div class="modal-header">
                <span id="modalTitle">Dialog</span>
                <button class="modal-close" id="modalClose">✕</button>
            </div>
            <div class="modal-body" id="modalBody"></div>
            <div class="modal-footer" id="modalFooter"></div>
        </div>
    </div>

    <script src="/js/app-config.js"></script>
    <script src="/js/api.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/dialogs.js"></script>
    <script src="/js/folders.js"></script>
    <script src="/js/files.js"></script>
    <script src="/js/upload.js"></script>
    <script src="/js/explorer.js"></script>
</body>
</html>
